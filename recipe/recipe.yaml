schema_version: 1

context:
  version: "0.0.4"

package:
  name: getsources
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/getsources/getsources-${{ version }}.tar.gz
  sha256: e37f7cf3ba17d158f0ac17b9386495d12cb34f5006fe1aba82a4ffc54550eca1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - dill ==0.4.0

tests:
  - python:
      imports:
        - getsources
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A way to get the source code of functions
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/mutating/getsources

extra:
  recipe-maintainers:
    - thewchan
